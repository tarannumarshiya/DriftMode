<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | DRIFTMODES</title>

    <!-- Tailwind CSS -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins",sans-serif;
        }

        body{
            background:black;
            color:white;
        }

        .hero{

            height:50vh;

            background:
            linear-gradient(rgba(0,0,0,0.7),
            rgba(0,0,0,0.7)),

            url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;

        }

        .glass{

            background:rgba(24,24,27,0.7);
            backdrop-filter:blur(10px);

        }

        .input-box{

            width:100%;
            padding:15px;
            border-radius:10px;
            background:#18181b;
            border:1px solid #27272a;
            color:white;
            outline:none;

        }

        .input-box:focus{

            border-color:orange;
            box-shadow:0px 0px 10px orange;

        }

        .btn{

            background:orange;
            padding:15px;
            border:none;
            border-radius:50px;
            width:100%;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;

        }

        .btn:hover{

            background:white;
            color:orange;

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="glass flex justify-between items-center px-10 py-5">

        <h1 class="text-3xl font-bold text-orange-500">

            DRIFTMODES

        </h1>

        <ul class="flex gap-8 text-lg">

            <li>
                <a href="speed-comparison.html" class="hover:text-orange-500">
                    Home
                </a>
            </li>

            <li>
                <a href="cars.html" class="hover:text-orange-500">
                    Cars
                </a>
            </li>

            <li>
                <a href="contact.html" class="text-orange-500">
                    Contact
                </a>
            </li>

        </ul>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <div>

            <h1 class="text-6xl font-bold mb-5">

                Contact

                <span class="text-orange-500">

                    DRIFTMODES

                </span>

            </h1>

            <p class="text-gray-300 text-lg">

                Premium automobile support

            </p>

        </div>

    </section>

    <!-- CONTACT FORM -->

    <section class="px-10 py-20">

        <div class="grid md:grid-cols-2 gap-10">

            <!-- LEFT -->

            <div class="glass p-10 rounded-3xl">

                <h2 class="text-4xl font-bold mb-5">

                    Get In Touch

                </h2>

                <p class="text-gray-400 mb-8">

                    Contact us for bookings,
                    test drives and sports car details.

                </p>

                <div class="space-y-5">

                    <div>

                        <h3 class="text-orange-500 text-xl font-semibold">

                            📍 Location

                        </h3>

                        <p class="text-gray-300">

                            Andhra Pradesh, India

                        </p>

                    </div>

                    <div>

                        <h3 class="text-orange-500 text-xl font-semibold">

                            📞 Phone

                        </h3>

                        <p class="text-gray-300">

                            +91 9876543210

                        </p>

                    </div>

                    <div>

                        <h3 class="text-orange-500 text-xl font-semibold">

                            ✉ Email

                        </h3>

                        <p class="text-gray-300">

                            driftmodes@gmail.com

                        </p>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="glass p-10 rounded-3xl">

                <form>

                    <div class="mb-5">

                        <input
                        type="text"
                        placeholder="Full Name"
                        class="input-box">

                    </div>

                    <div class="mb-5">

                        <input
                        type="email"
                        placeholder="Email Address"
                        class="input-box">

                    </div>

                    <div class="mb-5">

                        <input
                        type="text"
                        placeholder="Phone Number"
                        class="input-box">

                    </div>

                    <div class="mb-5">

                        <textarea
                        rows="5"
                        placeholder="Message"
                        class="input-box"></textarea>

                    </div>

                    <button class="btn">

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </section>

</body>

</html>
