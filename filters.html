<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Filters | DRIFTMODES</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-black text-white">

    <!-- NAVBAR -->

    <nav class="navbar flex justify-between items-center px-10 py-5 bg-zinc-900 sticky top-0 z-50">

        <h1 class="text-3xl font-bold text-orange-500">
            DRIFTMODES
        </h1>

        <ul class="nav-links flex gap-8 text-lg">

            <li>
                <a href="index.html"
                    class="hover:text-orange-500 duration-300">
                    Home
                </a>
            </li>

            <li>
                <a href="cars.html"
                    class="hover:text-orange-500 duration-300">
                    Cars
                </a>
            </li>

            <li>
                <a href="filter.html"
                    class="text-orange-500">
                    Filters
                </a>
            </li>

        </ul>

    </nav>

    <!-- HEADING -->

    <section class="py-20 text-center px-5">

        <h1 class="text-5xl md:text-6xl font-bold mb-5">

            Advanced

            <span class="text-orange-500">
                Car Filters
            </span>

        </h1>

        <p class="text-gray-400 text-lg">
            Search and filter premium cars instantly
        </p>

    </section>

    <!-- FILTER SECTION -->

    <section class="px-5 md:px-16 pb-20">

        <div class="bg-zinc-900 rounded-3xl p-8 md:p-10 shadow-2xl">

            <div class="grid md:grid-cols-3 gap-6">

                <!-- SEARCH -->

                <div>

                    <label class="block mb-3 text-lg font-semibold">
                        Search Car
                    </label>

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="BMW, Tesla..."
                        class="search-box w-full p-4 rounded-xl bg-zinc-800 text-white outline-none">

                </div>

                <!-- BRAND -->

                <div>

                    <label class="block mb-3 text-lg font-semibold">
                        Brand
                    </label>

                    <select
                        id="brandFilter"
                        class="search-box w-full p-4 rounded-xl bg-zinc-800 text-white outline-none">

                        <option value="all">All Brands</option>

                        <option value="BMW">BMW</option>

                        <option value="Tesla">Tesla</option>

                        <option value="Ford">Ford</option>

                        <option value="Audi">Audi</option>

                    </select>

                </div>

                <!-- FUEL -->

                <div>

                    <label class="block mb-3 text-lg font-semibold">
                        Fuel Type
                    </label>

                    <select
                        id="fuelFilter"
                        class="search-box w-full p-4 rounded-xl bg-zinc-800 text-white outline-none">

                        <option value="all">All Fuel Types</option>

                        <option value="Petrol">Petrol</option>

                        <option value="Electric">Electric</option>

                    </select>

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="flex flex-wrap justify-center gap-5 mt-10">

                <button
                    onclick="filterCars()"
                    class="custom-btn bg-orange-500 hover:bg-white hover:text-orange-500 duration-300 px-8 py-3 rounded-full text-lg font-semibold">

                    Apply Filters

                </button>

                <button
                    onclick="resetFilters()"
                    class="custom-btn border border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white duration-300 px-8 py-3 rounded-full text-lg font-semibold">

                    Reset

                </button>

            </div>

        </div>

    </section>

    <!-- CAR SECTION -->

    <section class="px-5 md:px-16 pb-20">

        <div class="grid md:grid-cols-3 gap-10">

            <!-- BMW -->

            <div
                class="car-card bg-zinc-900 rounded-3xl overflow-hidden card-hover"
                data-brand="BMW"
                data-fuel="Petrol">

                <img
                    src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop"
                    class="w-full h-60 object-cover">

                <div class="p-6">

                    <h2 class="text-2xl font-bold mb-3">
                        BMW M4
                    </h2>

                    <p class="text-gray-400 mb-2">
                        Fuel : Petrol
                    </p>

                    <p class="text-orange-500 text-xl font-semibold mb-5">
                        ₹85 Lakhs
                    </p>

                    <button
                        class="custom-btn bg-orange-500 px-5 py-2 rounded-full">

                        View Details

                    </button>

                </div>

            </div>

            <!-- TESLA -->

            <div
                class="car-card bg-zinc-900 rounded-3xl overflow-hidden card-hover"
                data-brand="Tesla"
                data-fuel="Electric">

                <img
                    src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop"
                    class="w-full h-60 object-cover">

                <div class="p-6">

                    <h2 class="text-2xl font-bold mb-3">
                        Tesla Model S
                    </h2>

                    <p class="text-gray-400 mb-2">
                        Fuel : Electric
                    </p>

                    <p class="text-orange-500 text-xl font-semibold mb-5">
                        ₹1.2 Crore
                    </p>

                    <button
                        class="custom-btn bg-orange-500 px-5 py-2 rounded-full">

                        View Details

                    </button>

                </div>

            </div>

            <!-- MUSTANG -->

            <div
                class="car-card bg-zinc-900 rounded-3xl overflow-hidden card-hover"
                data-brand="Ford"
                data-fuel="Petrol">

                <img
                    src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1200&auto=format&fit=crop"
                    class="w-full h-60 object-cover">

                <div class="p-6">

                    <h2 class="text-2xl font-bold mb-3">
                        Ford Mustang
                    </h2>

                    <p class="text-gray-400 mb-2">
                        Fuel : Petrol
                    </p>

                    <p class="text-orange-500 text-xl font-semibold mb-5">
                        ₹75 Lakhs
                    </p>

                    <button
                        class="custom-btn bg-orange-500 px-5 py-2 rounded-full">

                        View Details

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="bg-zinc-950 text-center py-6">

        <h2 class="text-2xl font-bold text-orange-500 mb-3">
            DRIFTMODES
        </h2>

        <p class="text-gray-400">
            © 2026 All Rights Reserved
        </p>

    </footer>

    <!-- JAVASCRIPT -->

    <script>

        function filterCars(){

            let searchValue =
                document.getElementById("searchInput")
                .value
                .toLowerCase();

            let brandValue =
                document.getElementById("brandFilter")
                .value;

            let fuelValue =
                document.getElementById("fuelFilter")
                .value;

            let cars =
                document.querySelectorAll(".car-card");

            cars.forEach(function(car){

                let carName =
                    car.querySelector("h2")
                    .innerText
                    .toLowerCase();

                let carBrand =
                    car.dataset.brand;

                let carFuel =
                    car.dataset.fuel;

                let matchesSearch =
                    carName.includes(searchValue);

                let matchesBrand =
                    brandValue === "all" ||
                    carBrand === brandValue;

                let matchesFuel =
                    fuelValue === "all" ||
                    carFuel === fuelValue;

                if(
                    matchesSearch &&
                    matchesBrand &&
                    matchesFuel
                ){

                    car.style.display = "block";

                }

                else{

                    car.style.display = "none";

                }

            });

        }

        function resetFilters(){

            document.getElementById("searchInput").value = "";

            document.getElementById("brandFilter").value = "all";

            document.getElementById("fuelFilter").value = "all";

            let cars =
                document.querySelectorAll(".car-card");

            cars.forEach(function(car){

                car.style.display = "block";

            });

        }

    </script>

</body>

</html>
